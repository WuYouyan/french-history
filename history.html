<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;600&family=Cormorant+Garamond:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bleu: #002395;
            --blanc: #EDEDE9;
            --rouge: #ED2939;
            --gold: #C9A84C;
            --dark: #0A0A0F;
            --mid: #1C1C2E;
            --text: #E8E4DC;
            --muted: #9A9580;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark);
            color: var(--text);
            font-family: 'Noto Serif SC', 'Cormorant Garamond', serif;
            overflow-x: hidden;
        }

        /* HERO */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(0, 35, 149, 0.35) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(237, 41, 57, 0.25) 0%, transparent 60%),
                var(--dark);
            padding: 2rem;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255, 255, 255, 0.015) 60px, rgba(255, 255, 255, 0.015) 61px),
                repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255, 255, 255, 0.015) 60px, rgba(255, 255, 255, 0.015) 61px);
            pointer-events: none;
        }

        .tricolor-bar {
            display: flex;
            width: 80px;
            height: 4px;
            margin: 0 auto 2.5rem;
            border-radius: 2px;
            overflow: hidden;
            gap: 2px;
        }

        .tricolor-bar span {
            flex: 1;
        }

        .tricolor-bar span:nth-child(1) {
            background: var(--bleu);
        }

        .tricolor-bar span:nth-child(2) {
            background: var(--blanc);
        }

        .tricolor-bar span:nth-child(3) {
            background: var(--rouge);
        }

        .hero-label {
            font-size: 0.7rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeUp 0.8s 0.2s ease forwards;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.8rem, 7vw, 5.5rem);
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: -0.02em;
            color: var(--blanc);
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeUp 0.8s 0.4s ease forwards;
        }

        .hero h1 em {
            font-style: italic;
            color: var(--gold);
        }

        .hero-sub {
            font-size: 1rem;
            color: var(--muted);
            letter-spacing: 0.05em;
            opacity: 0;
            animation: fadeUp 0.8s 0.6s ease forwards;
        }

        .scroll-hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            animation: fadeUp 0.8s 1.2s ease forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            color: var(--muted);
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .scroll-hint::after {
            content: '';
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, var(--gold), transparent);
            animation: pulse-line 2s ease-in-out infinite;
        }

        /* TIMELINE */
        .timeline-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 5rem 2rem 8rem;
            position: relative;
        }

        /* Central vertical line */
        .timeline-container::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: linear-gradient(to bottom,
                    transparent 0%,
                    rgba(201, 168, 76, 0.4) 5%,
                    rgba(201, 168, 76, 0.4) 95%,
                    transparent 100%);
            transform: translateX(-50%);
        }

        /* ERA SECTIONS */
        .era {
            margin-bottom: 1rem;
        }

        .era-header {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: 4rem 0 2.5rem;
        }

        .era-label {
            background: var(--dark);
            padding: 0.4rem 1.5rem;
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 20px;
            font-size: 0.65rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold);
            position: relative;
            z-index: 1;
        }

        /* EVENT CARDS */
        .event {
            display: grid;
            grid-template-columns: 1fr 40px 1fr;
            gap: 0;
            margin-bottom: 2.5rem;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .event.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .event.left .event-content {
            grid-column: 1;
            text-align: right;
            padding-right: 2rem;
        }

        .event.left .event-dot {
            grid-column: 2;
        }

        .event.left .event-spacer {
            grid-column: 3;
        }

        .event.right .event-spacer {
            grid-column: 1;
        }

        .event.right .event-dot {
            grid-column: 2;
        }

        .event.right .event-content {
            grid-column: 3;
            text-align: left;
            padding-left: 2rem;
        }

        .event-dot {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 0.5rem;
            z-index: 1;
        }

        .dot-inner {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--gold);
            border: 2px solid var(--dark);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.2);
            flex-shrink: 0;
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        .event:hover .dot-inner {
            box-shadow: 0 0 0 6px rgba(201, 168, 76, 0.15), 0 0 20px rgba(201, 168, 76, 0.3);
            transform: scale(1.3);
        }

        .event-content {
            display: flex;
            flex-direction: column;
        }

        .event-year {
            font-size: 1rem;
            letter-spacing: 0.25em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 0.35rem;
            font-weight: 600;
        }

        .event-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            padding: 1.1rem 1.3rem;
            transition: background 0.3s ease, border-color 0.3s ease, transform 0.3s ease;
            cursor: default;
        }

        .event:hover .event-card {
            background: rgba(201, 168, 76, 0.05);
            border-color: rgba(201, 168, 76, 0.2);
            transform: translateX(4px);
        }

        .event.left:hover .event-card {
            transform: translateX(-4px);
        }

        .event-title {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--blanc);
            margin-bottom: 0.4rem;
            line-height: 1.3;
        }

        .event-desc {
            font-size: 0.82rem;
            color: var(--muted);
            line-height: 1.7;
        }

        .event-tag {
            display: inline-block;
            margin-top: 0.6rem;
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.2rem 0.6rem;
            border-radius: 3px;
            font-weight: 600;
        }

        .tag-revolution {
            background: rgba(237, 41, 57, 0.12);
            color: #FF6B7A;
            border: 1px solid rgba(237, 41, 57, 0.25);
        }

        .tag-republic {
            background: rgba(0, 35, 149, 0.15);
            color: #7B9FFF;
            border: 1px solid rgba(0, 35, 149, 0.3);
        }

        .tag-war {
            background: rgba(120, 60, 0, 0.2);
            color: #D4A055;
            border: 1px solid rgba(180, 100, 0, 0.3);
        }

        .tag-culture {
            background: rgba(100, 0, 140, 0.15);
            color: #C070FF;
            border: 1px solid rgba(140, 0, 200, 0.25);
        }

        .tag-social {
            background: rgba(0, 120, 60, 0.15);
            color: #60C090;
            border: 1px solid rgba(0, 160, 80, 0.25);
        }

        .tag-europe {
            background: rgba(201, 168, 76, 0.1);
            color: var(--gold);
            border: 1px solid rgba(201, 168, 76, 0.25);
        }

        .tag-religion {
            background: rgba(80, 40, 0, 0.2);
            color: #E0A060;
            border: 1px solid rgba(150, 80, 0, 0.25);
        }

        /* FOOTER */
        .timeline-footer {
            text-align: center;
            padding: 3rem 2rem 5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .footer-flag {
            font-size: 2rem;
            margin-bottom: 1rem;
            opacity: 0.6;
        }

        .footer-text {
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* ANIMATIONS */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-line {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }
        }

        /* RESPONSIVE */
        @media (max-width: 640px) {
            .timeline-container::before {
                left: 20px;
            }

            .event {
                grid-template-columns: 40px 1fr;
            }

            .event.left .event-content,
            .event.right .event-content {
                grid-column: 2;
                text-align: left;
                padding-left: 1.2rem;
                padding-right: 0;
            }

            .event.left .event-dot,
            .event.right .event-dot {
                grid-column: 1;
                grid-row: 1;
            }

            .event.left .event-spacer,
            .event.right .event-spacer {
                display: none;
            }

            .event.left:hover .event-card {
                transform: translateX(4px);
            }
        }
    </style>
</head>

                // map tag type to CSS class
                const tagClassMap = {
                    revolution: 'tag-revolution',
                    republic: 'tag-republic',
                    war: 'tag-war',
                    culture: 'tag-culture',
                    social: 'tag-social',
                    europe: 'tag-europe',
                    religion: 'tag-religion'
                };

                function createEventEl(item) {
                    const evt = document.createElement('div');
                    const orientation = item.orientation === 'right' ? 'right' : 'left';
                    evt.className = 'event ' + orientation;

                    const content = document.createElement('div');
                    content.className = 'event-content';

                    const year = document.createElement('div');
                    year.className = 'event-year';
                    year.textContent = item.year || '';

                    const card = document.createElement('div');
                    card.className = 'event-card';

                    const title = document.createElement('div');
                    title.className = 'event-title';
                    title.textContent = item.title || '';

                    const desc = document.createElement('div');
                    desc.className = 'event-desc';
                    desc.textContent = item.description || '';

                    const tag = document.createElement('span');
                    const tagType = item.tag && item.tag.type ? item.tag.type : '';
                    tag.className = 'event-tag ' + (tagClassMap[tagType] || 'tag-culture');
                    tag.textContent = (item.tag && item.tag.label) ? item.tag.label : '';

                    card.appendChild(title);
                    card.appendChild(desc);
                    if (tag.textContent) card.appendChild(tag);

                    content.appendChild(year);
                    content.appendChild(card);

                    const dotWrap = document.createElement('div');
                    dotWrap.className = 'event-dot';
                    const dotInner = document.createElement('div');
                    dotInner.className = 'dot-inner';
                    dotWrap.appendChild(dotInner);

                    const spacer = document.createElement('div');
                    spacer.className = 'event-spacer';

                    if (orientation === 'left') {
                        evt.appendChild(content);
                        evt.appendChild(dotWrap);
                        evt.appendChild(spacer);
                    } else {
                        evt.appendChild(spacer);
                        evt.appendChild(dotWrap);
                        evt.appendChild(content);
                    }

                    return evt;
                }

                (function renderTimeline() {
                    const container = document.getElementById('timeline');
                    const eraMap = new Map();
                    const order = [];

                    timelineData.forEach(item => {
                        if (!eraMap.has(item.era)) { eraMap.set(item.era, []); order.push(item.era); }
                        eraMap.get(item.era).push(item);
                    });

                    order.forEach(eraName => {
                        const eraDiv = document.createElement('div');
                        eraDiv.className = 'era';

                        const header = document.createElement('div');
                        header.className = 'era-header';
                        const label = document.createElement('span');
                        label.className = 'era-label';
                        label.textContent = eraName;
                        header.appendChild(label);

                        eraDiv.appendChild(header);

                        eraMap.get(eraName).forEach(ev => {
                            const evEl = createEventEl(ev);
                            eraDiv.appendChild(evEl);
                        });

                        container.appendChild(eraDiv);
                    });

                    // intersection observer for reveal animation
                    const events = container.querySelectorAll('.event');
                    const observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) entry.target.classList.add('visible');
                        });
                    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

                    events.forEach(e => observer.observe(e));
                })();
        </script>
